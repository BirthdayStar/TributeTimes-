<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Tribute Times — Radio Keepsake Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Playfair+Display+SC:wght@400;700;900&family=IM+Fell+English:ital@0;1&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#8b1010;--dkred:#6b0808;--yellow:#f5c800;
  --ink:#111;--muted:#555;--rule:#ccc;
  --screen:#f4f0e8;--border:#c8b89a;
  --card-bg:#fff;--label-col:#6b5a3e;--input-bg:#faf8f4;
}
body{background:var(--screen);font-family:'DM Sans',sans-serif;color:#2a1e10;min-height:100vh;}

#ui{max-width:780px;margin:0 auto;padding:24px 16px 60px;}
.ui-header{text-align:center;padding:24px 0 20px;border-bottom:2px solid #c8b89a;margin-bottom:22px;}
.ui-title{font-family:'Playfair Display',serif;font-weight:900;font-style:italic;font-size:2rem;color:#1a0e04;}
.ui-title span{color:var(--red);}
.ui-sub{font-size:0.7rem;color:#8a7060;letter-spacing:0.25em;margin-top:4px;}

.logo-row{display:flex;gap:12px;margin-bottom:18px;}
.logo-slot{flex:1;border:1px dashed #c8b89a;border-radius:3px;padding:12px;text-align:center;background:#fff;position:relative;overflow:hidden;cursor:pointer;transition:border-color 0.2s;}
.logo-slot:hover{border-color:var(--red);}
.logo-slot label{display:block;font-size:0.55rem;letter-spacing:0.3em;color:#8a7060;text-transform:uppercase;margin-bottom:6px;cursor:pointer;}
.logo-slot .ph{font-size:1.3rem;display:block;color:#c8b89a;}
.logo-slot img.preview{max-height:46px;max-width:100%;object-fit:contain;display:none;margin:0 auto;}
.logo-slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.logo-slot .rm{display:none;position:absolute;top:3px;right:5px;background:none;border:none;color:#8a7060;cursor:pointer;font-size:0.8rem;z-index:2;}

.card{background:var(--card-bg);border:1px solid #d8c8b0;border-radius:3px;padding:22px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.card h2{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:var(--red);margin-bottom:16px;}
.frow{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
.fg{flex:1;min-width:148px;display:flex;flex-direction:column;gap:4px;}
.fg.wide{flex:2;min-width:230px;}
.fg label{font-size:0.54rem;letter-spacing:0.3em;color:#8a7060;text-transform:uppercase;}
.fg input,.fg select,.fg textarea{background:var(--input-bg);border:1px solid #d8c8b0;border-radius:2px;color:#1a0e04;font-family:'DM Sans',sans-serif;font-size:0.85rem;padding:8px 10px;outline:none;transition:border-color 0.18s;width:100%;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--red);}
.fg textarea{resize:vertical;min-height:54px;}
.fg select option{background:#fff;}

.dob-wrap{display:flex;align-items:center;gap:3px;background:var(--input-bg);border:1px solid #d8c8b0;border-radius:2px;padding:5px 10px;transition:border-color 0.18s;}
.dob-wrap:focus-within{border-color:var(--red);}
.dob-wrap.err{border-color:#8b1515;}
.dp{background:transparent;border:none;outline:none;color:#1a0e04;font-family:'DM Sans',sans-serif;font-size:0.85rem;text-align:center;padding:3px 1px;width:2em;}
.dp.yr{width:3.2em;}
.dp::placeholder{color:#c8b89a;}
.dsep{color:#c8b89a;user-select:none;}
.dob-hint{font-size:0.54rem;margin-top:3px;min-height:13px;font-style:italic;}
.dob-hint.ok{color:#3a7a3a;}
.dob-hint.er{color:#9a4040;}

.gen-btn{width:100%;padding:14px;background:var(--red);border:none;border-radius:2px;font-family:'Playfair Display SC',serif;font-size:0.88rem;letter-spacing:0.3em;color:#fff;cursor:pointer;transition:opacity 0.18s;}
.gen-btn:hover{opacity:0.85;}
.gen-btn:disabled{opacity:0.3;cursor:not-allowed;}
.status{text-align:center;font-size:0.68rem;color:#8a7060;letter-spacing:0.15em;margin-top:12px;min-height:16px;}
.act-row{display:flex;gap:10px;justify-content:center;margin-top:16px;}
.act-btn{padding:9px 24px;background:transparent;border:1px solid #c8b89a;border-radius:2px;font-family:'Playfair Display SC',serif;font-size:0.62rem;letter-spacing:0.25em;color:var(--red);cursor:pointer;transition:all 0.18s;display:none;}
.act-btn:hover{background:var(--red);border-color:var(--red);color:#fff;}

#star{
  display:none;background:#fff;color:var(--ink);width:210mm;
  margin:28px auto 60px;position:relative;
  font-family:'Libre Baskerville',Georgia,serif;font-size:8pt;line-height:1.5;
  box-shadow:0 8px 60px rgba(0,0,0,0.3);border:1px solid #aaa;
}
.np-top-meta{display:flex;justify-content:space-between;padding:4px 8mm;border-bottom:1px solid var(--ink);font-family:'DM Sans',sans-serif;font-size:7pt;font-weight:500;color:var(--ink);}
.np-masthead{text-align:center;padding:6px 8mm 4px;border-bottom:3px solid var(--ink);}
.np-masthead-name{font-family:'Playfair Display',serif;font-weight:900;font-size:5rem;line-height:1;color:var(--ink);letter-spacing:-0.01em;}
.np-masthead-rule{border:none;border-top:1px solid var(--ink);margin:3px 0;}
.np-info-strip{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;border-bottom:2px solid var(--ink);}
.np-info-box{padding:5px 8px;border-right:1px solid var(--ink);font-family:'DM Sans',sans-serif;font-size:7.5pt;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:6px;min-height:44px;}
.np-info-box:last-child{border-right:none;}
.np-info-box .wx-temp{font-size:1.3rem;font-weight:800;color:var(--ink);line-height:1;}
.np-info-box .wx-detail{font-size:6.5pt;font-weight:400;color:var(--muted);line-height:1.3;}
.np-info-box img{max-height:32px;max-width:60px;object-fit:contain;}
.np-info-box-logo{justify-content:center;}
.np-section-row{display:grid;grid-template-columns:2fr 1.5fr 1fr;border-bottom:1px solid var(--ink);}
.np-section-label{padding:3px 8px;font-family:'DM Sans',sans-serif;font-size:9pt;font-weight:700;color:var(--ink);border-right:1px solid var(--ink);}
.np-section-label:last-child{border-right:none;text-align:center;}
.np-body{display:grid;grid-template-columns:1.8fr 1fr;border-bottom:1px solid var(--ink);min-height:160mm;}
.np-left{border-right:1px solid var(--ink);}
.np-photo-wrap{position:relative;overflow:hidden;border-bottom:1px solid var(--ink);}
.np-photo-img{width:100%;height:130mm;object-fit:cover;display:block;filter:grayscale(30%) contrast(1.05);}
.np-photo-fallback{width:100%;height:130mm;background:#e8e4dc;display:flex;align-items:center;justify-content:center;font-size:4rem;}
.np-photo-page-tag{position:absolute;bottom:12px;left:12px;background:var(--ink);color:#fff;font-family:'DM Sans',sans-serif;font-weight:800;font-size:8pt;padding:3px 8px;letter-spacing:0.05em;}
.np-photo-quote{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.75);color:#fff;padding:8px 12px;font-family:'IM Fell English',serif;font-style:italic;font-size:8.5pt;line-height:1.4;}
.np-photo-quote::before{content:'\201C';font-size:1.3rem;margin-right:3px;vertical-align:-4px;color:#f5c800;}
.np-photo-quote::after{content:'\201D';font-size:1.3rem;margin-left:3px;vertical-align:-4px;color:#f5c800;}
.np-left-bottom{display:grid;grid-template-columns:1fr 1fr;}
.np-teaser{padding:6px 8px;border-right:1px solid var(--rule);}
.np-teaser:last-child{border-right:none;}
.np-teaser-hed{font-family:'DM Sans',sans-serif;font-weight:700;font-size:8pt;color:var(--ink);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--ink);padding-bottom:2px;margin-bottom:3px;}
.np-teaser-num{background:var(--ink);color:#fff;font-size:7pt;padding:1px 5px;font-weight:700;font-family:'DM Sans',sans-serif;}
.np-teaser-copy{font-size:6.5pt;color:var(--muted);line-height:1.5;text-align:justify;}
.np-right-top{padding:7px 8px;border-bottom:1px solid var(--ink);}
.np-right-bottom{padding:7px 8px;}
.np-r-hed{font-family:'Playfair Display',serif;font-weight:900;font-size:1rem;color:var(--ink);line-height:1.1;margin-bottom:2px;}
.np-r-hed em{color:var(--ink);font-style:italic;}
.np-r-copy{font-size:6.5pt;color:var(--muted);line-height:1.6;text-align:justify;margin-top:4px;}
.np-r-rule{border:none;border-top:1px solid var(--rule);margin:6px 0;}
.np-chart-title{font-family:'DM Sans',sans-serif;font-weight:700;font-size:8pt;color:var(--ink);margin-bottom:3px;}
.np-chart-tbl{width:100%;border-collapse:collapse;margin-bottom:3px;}
.np-chart-tbl tr{border-bottom:0.5px solid #e0e0e0;}
.np-chart-tbl td{padding:1px 2px;font-size:6pt;vertical-align:top;}
.np-chart-pos{font-weight:800;color:var(--ink);width:12px;font-size:7pt;}
.np-chart-title-t{font-weight:600;font-size:6.5pt;}
.np-chart-artist{font-style:italic;color:var(--muted);font-size:5.5pt;}
.np-bottom{display:grid;grid-template-columns:2fr 1fr;border-top:2px solid var(--ink);min-height:28mm;}
.np-bottom-left{display:grid;grid-template-columns:1fr 1fr;border-right:1px solid var(--ink);}
.np-bottom-story{padding:5px 7px;border-right:1px solid var(--rule);}
.np-bottom-story:last-child{border-right:none;}
.np-bottom-hed{font-family:'DM Sans',sans-serif;font-weight:700;font-size:7.5pt;color:var(--ink);border-bottom:1px solid var(--rule);padding-bottom:2px;margin-bottom:2px;}
.np-bottom-copy{font-size:6pt;color:var(--muted);line-height:1.5;text-align:justify;}
.np-bottom-right{padding:6px 8px;display:flex;flex-direction:column;justify-content:center;}
.np-sig{font-family:'IM Fell English',serif;font-style:italic;font-size:6.5pt;color:var(--muted);line-height:1.5;border-top:0.5px solid var(--rule);padding-top:4px;margin-top:3px;}
.np-sig-line{border-bottom:1px solid var(--ink);height:16px;margin-bottom:1px;}
.np-sig-lbl{font-family:'DM Sans',sans-serif;font-size:5.5pt;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;}
.np-prices{font-size:6pt;color:var(--muted);line-height:1.6;}
.np-prices span{font-weight:700;color:var(--ink);}

@media print{
  body{background:white;}
  #ui{display:none;}
  #star{display:block!important;margin:0 auto;box-shadow:none;width:210mm;}
}
</style>
</head>
